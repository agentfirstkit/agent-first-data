name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: agent-first-data-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: typescript/package-lock.json

      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest

      - name: Install TypeScript deps
        working-directory: typescript
        run: |
          npm install
          npm install --no-save tsx

      - name: Rust (fmt + clippy)
        working-directory: rust
        run: |
          cargo fmt --all --check
          cargo clippy --lib -- -D warnings

      - name: Go (fmt + compile)
        run: |
          cd go
          unformatted="$(find . -name '*.go' -type f -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then echo "Go files need formatting:" >&2; printf '%s\n' "$unformatted" >&2; exit 1; fi
          go test -run '^$' ./...

      - name: Python (syntax)
        run: cd python && python3 -m compileall agent_first_data examples tests >/dev/null

      - name: TypeScript (typecheck)
        run: cd typescript && npx tsc --noEmit

      - name: Rust (tests)
        working-directory: rust
        run: |
          cargo test --lib --tests
          cargo test --lib --tests --features tracing
          cargo test --examples --features cli-help,cli-help-markdown

      - name: Go (tests)
        run: cd go && go test -v ./...

      - name: Python (tests)
        run: cd python && PYTHONPATH=. python3 -m pytest tests/ examples/agent_cli.py -v

      - name: TypeScript (tests)
        working-directory: typescript
        run: |
          npx tsx --test src/*.test.ts
          npx tsx --test examples/agent_cli.ts
